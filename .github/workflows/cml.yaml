name: CML & DVC
on: [push]
jobs:
  train-and-report:
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - uses: iterative/setup-cml@v1
      - uses: iterative/setup-dvc@v1
      - name: Setup access to remote
        env:
          DAGS_HUB_USER: ${{ secrets.DAGS_HUB_USER }}
          DAGS_HUB_PW: ${{ secrets.DAGS_HUB_PW }}
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${DAGS_HUB_USER}
          dvc remote modify origin --local password ${DAGS_HUB_PW}
      - name: Pull data
        run: |
          mkdir data
          mkdir models
          mkdir reports
          dvc pull -r origin

      - name: Train model
        run: |
          pip install -r requirements.txt
          dvc repro
